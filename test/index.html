<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
    </head>
    <body>
        <button id="btn">Завантажити список файлів</button>
        <pre id="output"></pre>

        <script>
            document.getElementById('btn').addEventListener('click', async () => {
                // просто читаємо вміст репо без завантаження
                const response = await fetch('https://api.github.com/repos/melmanq7/toolbox/contents/');
                const data = await response.json();
                
                document.getElementById('output').textContent = JSON.stringify(data, null, 2);
            });
        </script>
    </body>
</html>
